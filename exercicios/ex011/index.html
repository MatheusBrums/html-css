<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferente ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="bigphoto">
    </picture>
    <h1>Reproduzindo áudios em HTML5</h1>
    <!--<audio src="midia/musica.mp3" autoplay controls></audio>-->
    <audio preload="auto" autoplay controls loop>
        <source src="midia/musica.mp3" type="audio/mpeg">
        <source src="midia/musica.ogg" type="audio/ogg">
        <p>infelizmente teu navegador não reproduz audio <a href="midia/musica.mp3">clique aqui</a> pra baixar o mp3.</p>
    </audio>
    <h1>Inserindo Vídeos Hospedados Localmente</h1>
    <p>Este vídeo está hospedado no meu proprio servidor</p>
    <p><a href="pag002.html">clique aqui</a> para ver o video</p>
</body>
</html>
